<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Name Generator</title>
  <style>
    :root {
      --att-blue: #009fdb;
      --electric: #12c8ff;
      --deep-blue: #003a70;
      --navy: #061b33;
      --ink: #10243c;
      --muted: #5f7187;
      --line: rgba(0, 96, 170, 0.16);
      --card: rgba(255, 255, 255, 0.9);
      --soft: #f4f8fc;
      --glow: 0 18px 55px rgba(18, 200, 255, 0.28);
      --shadow: 0 24px 70px rgba(7, 35, 68, 0.14);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(18, 200, 255, 0.22), transparent 34rem),
        radial-gradient(circle at 88% 12%, rgba(0, 159, 219, 0.18), transparent 30rem),
        linear-gradient(135deg, #f8fbff 0%, #eef7ff 45%, #ffffff 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.52;
      background-image:
        linear-gradient(rgba(0, 77, 132, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 77, 132, 0.035) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, black, transparent 82%);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      position: relative;
      width: min(100%, 1080px);
      margin: 0 auto;
      padding: 28px 18px 44px;
    }

    .hero {
      min-height: auto;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 16px;
      padding: 22px 0 18px;
      text-align: center;
    }

    .eyebrow {
      align-self: center;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      color: var(--deep-blue);
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(0, 159, 219, 0.18);
      border-radius: 999px;
      box-shadow: 0 12px 32px rgba(0, 76, 120, 0.08);
      backdrop-filter: blur(14px);
      animation: riseIn 600ms ease both;
    }

    h1 {
      margin: 0;
      color: var(--navy);
      font-size: clamp(2.35rem, 9vw, 5.7rem);
      line-height: 0.93;
      letter-spacing: 0;
      text-wrap: balance;
      animation: riseIn 720ms 80ms ease both;
    }

    .subhead {
      max-width: 680px;
      margin: 0 auto;
      color: #264965;
      font-size: clamp(1.08rem, 3.8vw, 1.55rem);
      line-height: 1.45;
      text-wrap: balance;
      animation: riseIn 760ms 150ms ease both;
    }

    .mascot-wrap {
      position: relative;
      width: min(72vw, 300px);
      margin: 0 auto;
      animation: floatIn 840ms 230ms cubic-bezier(.2,.8,.2,1) both;
    }

    .mascot-wrap::before,
    .mascot-wrap::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(2px);
      opacity: 0.9;
      pointer-events: none;
    }

    .mascot-wrap::before {
      width: 92px;
      height: 92px;
      right: -18px;
      top: 11%;
      background: radial-gradient(circle, rgba(18, 200, 255, 0.28), transparent 68%);
      animation: pulse 3.4s ease-in-out infinite;
    }

    .mascot-wrap::after {
      width: 130px;
      height: 130px;
      left: -22px;
      bottom: 7%;
      background: radial-gradient(circle, rgba(0, 159, 219, 0.22), transparent 70%);
      animation: pulse 4.1s 600ms ease-in-out infinite;
    }

    .mascot {
      position: relative;
      z-index: 1;
      display: block;
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 32px;
      border: 1px solid rgba(255, 255, 255, 0.84);
      box-shadow:
        0 0 0 10px rgba(255, 255, 255, 0.62),
        0 28px 75px rgba(0, 58, 112, 0.24),
        0 0 65px rgba(18, 200, 255, 0.3);
      transform: translateZ(0);
    }

    .micro-line {
      margin: -2px auto 0;
      color: var(--deep-blue);
      font-weight: 800;
      font-size: 0.98rem;
      animation: riseIn 840ms 340ms ease both;
    }

    .section-stack {
      display: grid;
      gap: 18px;
      padding: 0 0 34px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(0, 120, 190, 0.16);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(135deg, rgba(18, 200, 255, 0.12), transparent 34%),
        radial-gradient(circle at top right, rgba(0, 159, 219, 0.17), transparent 22rem);
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    .featured {
      padding: clamp(22px, 5vw, 38px);
    }

    .card-kicker {
      margin: 0 0 8px;
      color: var(--att-blue);
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    h2 {
      margin: 0;
      color: var(--navy);
      font-size: clamp(1.75rem, 6vw, 3rem);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .example-icons {
      display: inline-flex;
      gap: 0.18em;
      font-size: 0.58em;
      vertical-align: 0.12em;
    }

    .featured-grid {
      display: grid;
      gap: 18px;
      margin-top: 24px;
    }

    .feature-block {
      padding: 18px;
      border: 1px solid rgba(0, 159, 219, 0.13);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.68);
      box-shadow: 0 12px 35px rgba(2, 54, 99, 0.07);
    }

    .feature-block h3 {
      margin: 0 0 9px;
      color: var(--deep-blue);
      font-size: 0.88rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .feature-block p,
    .feature-block li {
      color: #25455f;
      font-size: 1rem;
      line-height: 1.55;
    }

    .feature-block p {
      margin: 0;
    }

    .feature-block ul {
      display: grid;
      gap: 9px;
      margin: 0;
      padding-left: 1.1rem;
    }

    .traits {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .trait {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 8px 12px;
      color: var(--deep-blue);
      font-weight: 800;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(255,255,255,0.92), rgba(226,246,255,0.9));
      border: 1px solid rgba(0, 159, 219, 0.2);
    }

    .form-card {
      padding: clamp(22px, 5vw, 34px);
    }

    .form-intro {
      margin: 10px 0 24px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 1.02rem;
    }

    .form-grid {
      display: grid;
      gap: 18px;
    }

    .field {
      display: grid;
      gap: 8px;
      text-align: left;
    }

    label,
    legend {
      color: var(--navy);
      font-size: 0.94rem;
      font-weight: 900;
    }

    input[type="text"] {
      width: 100%;
      min-height: 54px;
      padding: 14px 15px;
      color: var(--navy);
      border: 1px solid rgba(0, 76, 132, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.84);
      outline: none;
      box-shadow: 0 10px 28px rgba(5, 37, 70, 0.06);
      transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
    }

    input[type="text"]::placeholder {
      color: #8798aa;
    }

    input[type="text"]:focus {
      border-color: var(--electric);
      box-shadow: 0 0 0 4px rgba(18, 200, 255, 0.18), 0 14px 34px rgba(0, 74, 132, 0.08);
      transform: translateY(-1px);
    }

    fieldset {
      margin: 2px 0 0;
      padding: 0;
      border: 0;
    }

    .vibe-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .vibe-card {
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 58px;
      padding: 13px 14px;
      color: var(--ink);
      cursor: pointer;
      user-select: none;
      border: 1px solid rgba(0, 76, 132, 0.16);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.74);
      box-shadow: 0 10px 24px rgba(2, 41, 76, 0.06);
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .vibe-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 34px rgba(2, 41, 76, 0.1);
    }

    .vibe-card input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .vibe-icon {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      flex: 0 0 36px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(0, 159, 219, 0.13), rgba(18, 200, 255, 0.18));
      font-size: 1.18rem;
    }

    .vibe-name {
      font-weight: 900;
    }

    .vibe-card.is-selected {
      color: var(--deep-blue);
      border-color: rgba(0, 159, 219, 0.74);
      background: linear-gradient(135deg, rgba(255,255,255,0.98), rgba(221, 246, 255, 0.94));
      box-shadow: 0 0 0 4px rgba(18, 200, 255, 0.14), 0 18px 42px rgba(0, 118, 190, 0.16);
    }

    .vibe-card:has(input:focus-visible) {
      outline: 3px solid rgba(18, 200, 255, 0.36);
      outline-offset: 3px;
    }

    .validation {
      min-height: 24px;
      margin: 2px 0 0;
      color: #b23a46;
      font-weight: 800;
      line-height: 1.35;
    }

    .cta-row {
      display: grid;
      gap: 12px;
      margin-top: 6px;
    }

    .primary-btn,
    .secondary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      width: 100%;
      min-height: 58px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 950;
      letter-spacing: 0;
      transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
    }

    .primary-btn {
      color: white;
      background:
        linear-gradient(135deg, var(--deep-blue), var(--att-blue) 55%, var(--electric));
      box-shadow: 0 18px 42px rgba(0, 159, 219, 0.36), 0 0 0 1px rgba(255,255,255,0.22) inset;
    }

    .primary-btn:hover,
    .secondary-btn:hover {
      transform: translateY(-2px);
      filter: saturate(1.05);
    }

    .primary-btn:active,
    .secondary-btn:active {
      transform: translateY(0) scale(0.99);
    }

    .primary-btn:focus-visible,
    .secondary-btn:focus-visible {
      outline: 3px solid rgba(18, 200, 255, 0.38);
      outline-offset: 3px;
    }

    .secondary-btn {
      color: var(--deep-blue);
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(0, 159, 219, 0.2);
      box-shadow: 0 12px 26px rgba(0, 76, 132, 0.08);
    }

    .result-card {
      display: none;
      padding: clamp(24px, 5vw, 40px);
      background:
        linear-gradient(145deg, rgba(255,255,255,0.96), rgba(236, 249, 255, 0.92)),
        radial-gradient(circle at top right, rgba(18, 200, 255, 0.22), transparent 22rem);
    }

    .result-card.is-visible {
      display: block;
      animation: reveal 560ms cubic-bezier(.2,.8,.2,1) both;
    }

    .sparkles {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 12px;
      font-size: 1.25rem;
      color: var(--att-blue);
    }

    .sparkles span {
      animation: twinkle 1.9s ease-in-out infinite;
    }

    .sparkles span:nth-child(2) {
      animation-delay: 220ms;
    }

    .sparkles span:nth-child(3) {
      animation-delay: 440ms;
    }

    .name-badge-icon {
      display: grid;
      place-items: center;
      width: 92px;
      height: 92px;
      margin: 0 auto 16px;
      color: var(--deep-blue);
      font-size: 3.4rem;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 28%, rgba(255, 255, 255, 0.96), rgba(219, 246, 255, 0.9) 58%, rgba(0, 159, 219, 0.12)),
        linear-gradient(135deg, rgba(255,255,255,0.9), rgba(18, 200, 255, 0.18));
      border: 1px solid rgba(0, 159, 219, 0.18);
      box-shadow: 0 18px 48px rgba(0, 159, 219, 0.24), 0 0 0 8px rgba(255,255,255,0.54);
      animation: pulse 3.5s ease-in-out infinite;
    }

    .ai-name {
      margin: 0;
      color: var(--navy);
      font-size: clamp(2rem, 8vw, 4.6rem);
      line-height: 0.98;
      text-align: center;
      text-wrap: balance;
    }

    .ai-title {
      margin: 13px auto 28px;
      color: var(--deep-blue);
      font-size: clamp(1.05rem, 4vw, 1.45rem);
      font-weight: 900;
      text-align: center;
      text-wrap: balance;
    }

    .output-grid {
      display: grid;
      gap: 14px;
    }

    .output-block {
      padding: 17px;
      border-radius: 8px;
      border: 1px solid rgba(0, 159, 219, 0.16);
      background: rgba(255,255,255,0.72);
      box-shadow: 0 12px 30px rgba(0, 58, 112, 0.07);
    }

    .output-block h3 {
      margin: 0 0 8px;
      color: var(--att-blue);
      font-size: 0.78rem;
      font-weight: 950;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .output-block p {
      margin: 0;
      color: #243f58;
      font-size: 1.03rem;
      line-height: 1.58;
    }

    .footer {
      padding: 30px 12px 12px;
      color: #52677d;
      text-align: center;
      line-height: 1.55;
    }

    .footer blockquote {
      margin: 0;
    }

    .footer p {
      margin: 0;
      font-size: 1.02rem;
      font-weight: 800;
    }

    .footer cite {
      display: block;
      margin-top: 6px;
      color: var(--deep-blue);
      font-style: normal;
      font-weight: 900;
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes floatIn {
      from {
        opacity: 0;
        transform: translateY(22px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(0.92);
        opacity: 0.65;
      }
      50% {
        transform: scale(1.14);
        opacity: 1;
      }
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.96);
        filter: blur(5px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes twinkle {
      0%, 100% {
        transform: translateY(0) scale(0.82);
        opacity: 0.42;
      }
      50% {
        transform: translateY(-4px) scale(1.12);
        opacity: 1;
      }
    }

    @media (min-width: 680px) {
      .app {
        padding: 34px 28px 58px;
      }

      .hero {
        min-height: 96vh;
        justify-content: center;
        gap: 24px;
        padding: 22px 0 30px;
      }

      .mascot-wrap {
        width: min(76vw, 330px);
      }

      .featured-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .feature-block.wide {
        grid-column: 1 / -1;
      }

      .vibe-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .cta-row {
        grid-template-columns: 1fr auto;
        align-items: center;
      }

      .primary-btn {
        min-width: 320px;
      }
    }

    @media (min-width: 920px) {
      .section-stack {
        gap: 28px;
      }

      .vibe-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .output-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .output-block.wide {
        grid-column: 1 / -1;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }


    /* Desktop layout: keeps mobile stacked, shows form above the fold on laptops/desktops. */
    @media (min-width: 900px) {
      body {
        min-height: 100vh;
      }

      .app {
        width: min(1220px, calc(100% - 56px));
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(300px, 0.82fr) minmax(420px, 1.18fr);
        grid-template-areas:
          "hero form"
          "footer footer";
        align-items: center;
        gap: clamp(28px, 4vw, 64px);
        padding: 28px;
      }

      .hero {
        grid-area: hero;
        min-height: auto;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        gap: 14px;
        padding: 0;
        text-align: left;
      }

      .hero h1 {
        font-size: clamp(3.25rem, 4.9vw, 5.35rem);
        max-width: 9ch;
        margin: 0;
        line-height: 0.96;
      }

      .subhead {
        margin: 0;
        max-width: 24rem;
        font-size: clamp(1.02rem, 1.3vw, 1.18rem);
      }

      .mascot-wrap {
        align-self: flex-start;
        width: min(31vw, 330px);
        margin-top: 4px;
      }

      .micro-line {
        align-self: flex-start;
        margin: 2px 0 0;
        max-width: 24rem;
      }

      .section-stack {
        grid-area: form;
        display: block;
        width: 100%;
        max-width: 640px;
        justify-self: stretch;
        align-self: center;
        padding: 0;
      }

      .form-card {
        width: 100%;
        padding: clamp(24px, 2.7vw, 34px);
      }

      .form-grid {
        gap: 16px;
      }

      .vibe-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .cta-row {
        grid-template-columns: 1fr;
      }

      .primary-btn {
        width: 100%;
        min-width: 0;
      }

      .result-card {
        margin-top: 18px;
      }

      .footer {
        grid-area: footer;
        margin-top: 0;
        padding: 8px 0 24px;
      }
    }

    @media (min-width: 1240px) {
      .app {
        grid-template-columns: minmax(330px, 0.78fr) minmax(480px, 1.22fr);
      }

      .mascot-wrap {
        width: min(28vw, 340px);
      }
    }

  </style>
</head>
<body>
  <main class="app">
    <section class="hero" aria-labelledby="page-title">
      <h1 id="page-title">AI Name Generator</h1>

  <script>
    const form = document.querySelector("#alterEgoForm");

    const output = {

    const vibeProfiles = {

    const archetypes = [
      {

      },
      {

        keywords: ["growth", "sales", "revenue", "go-to-market", "gtm", "customer growth", "pipeline", "market"],

      },
      {

        keywords: ["customer", "experience", "cx", "service", "support", "retention", "client"],
        prefixes: ["Guide", "Beacon", "Pulse", "Clarity"],
        suffixes: ["Beacon", "Companion", "Pilot", "Anchor"],
        weight: 1.08
      },
      {
        id: "connectivity-builder",
        keywords: ["fiber", "wireless", "network", "5g", "broadband", "connectivity", "device", "mobility"],
        prefixes: ["Signal", "Orbit", "Beacon", "Quantum"],
        suffixes: ["Pulse", "Beacon", "Overdrive", "Volt"],
        weight: 1.1
      }
    ];

    const weakWords = ["Data", "Sync", "Flow", "Nexus", "Logic", "AI", "Cloud", "Nova", "Valor", "Summit", "Compass", "Forge", "Exec", "Helper", "Helpful", "Strato", "Valorant"];
    const stickyEndings = ["Prime", "Overdrive", "Guardian", "Voyager", "Glow", "Magic", "Command", "Vortex", "Helix", "Orion", "Zenith", "Pinnacle", "Bingo", "Sparkle", "Kicker", "Jolt", "Glimmer", "Zipline", "Thunderbolt", "Blitz", "Voltage", "Firebolt", "Kaboom", "Sentinel", "Defender", "Phoenix", "Keeper", "Anchor", "Pilot", "Harbor", "Ally", "Steward", "Bot", "Bolt", "Comet", "Dash", "Dynamo", "Falcon", "Flash", "Jet", "Joyride", "Kinetic", "Lumen", "Ranger", "Warp", "Whiz"];
    const smileWords = ["Robo", "Captain", "Quantum", "Cosmo", "Volt", "Turbo", "Bright", "Rocket", "Buzzy", "Magic", "Overdrive", "Guardian", "Thunderbolt", "Keeper", "Bot", "Bolt", "Dash", "Dynamo", "Falcon", "Flash", "Jet", "Joyride", "Lumen", "Ranger", "Warp", "Whiz"];
    const aGradeWords = ["Quantum", "Captain", "Bright", "Blitz", "Magic", "Overdrive", "Guardian", "Voyager", "Oracle", "Cosmo", "Volt", "Vortex", "Helix", "Orion", "Zenith", "Apex", "Sterling", "Archer", "Vanguard", "Pinnacle", "Rocket", "Bingo", "Sparkle", "Kicker", "Jolt", "Glimmer", "Zipline", "Buzzy", "Kaboom", "Voltage", "Thunderbolt", "Firebolt", "Sentinel", "Titan", "Shield", "Phoenix", "Defender", "Keeper", "Guide", "Anchor", "Scout", "Pilot", "Harbor", "Ally", "Steward", "Bot", "Bolt", "Comet", "Dash", "Dynamo", "Falcon", "Flash", "Jet", "Joyride", "Kinetic", "Lumen", "Ranger", "Warp", "Whiz"];

    let lastInputs = null;
    let rerollCount = 0;
    let lastGeneratedName = "";
    let lastGenerationKey = "";

    function pick(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function cleanName(value) {
      const trimmed = value.trim().split(/\s+/)[0] || "AI";
      return trimmed.replace(/[^a-zA-Z]/g, "") || "AI";
    }

    function toTitleWord(value) {
      const cleaned = String(value).replace(/[^a-zA-Z]/g, "");
      return cleaned ? cleaned[0].toUpperCase() + cleaned.slice(1).toLowerCase() : "";
    }

    function extractRoleNameWords(role) {
      const roleWordAllowlist = new Set([
        "lead", "director", "product", "marketing", "strategy", "strategic", "growth", "brand",
        "customer", "operations", "program", "manager", "chief", "staff", "analytics", "insight",
        "creative", "sales", "fiber", "wireless", "device", "promo", "experience", "innovation"
      ]);
      const roleWordStoplist = new Set(["and", "the", "of", "for", "to", "with", "in", "at", "att"]);
      return String(role)
        .split(/\s+/)
        .map(toTitleWord)
        .filter(Boolean)
        .filter(word => !roleWordStoplist.has(word.toLowerCase()))
        .filter(word => roleWordAllowlist.has(word.toLowerCase()))
        .filter(word => word.length >= 3 && word.length <= 10)
        .slice(0, 3);
    }

    function inferArchetype(role) {
      const normalized = `${role}`.toLowerCase();
      let best = archetypes[0];
      let bestScore = 0;

      archetypes.forEach(archetype => {
        const score = archetype.keywords.reduce((total, keyword) => {
          return total + (normalized.includes(keyword) ? Math.max(8, keyword.length) : 0);
        }, 0);
        if (score > bestScore) {
          best = archetype;
          bestScore = score;
        }
      });

      return bestScore ? best : {
        id: "creative-sidekick",
        prefixes: ["Bright", "Rocket", "Guide", "Quantum"],
        suffixes: ["Magic", "Overdrive", "Guardian", "Pilot"],
        weight: 1
      };
    }

    function getInputs() {
      const formData = new FormData(form);
      return {
        name: String(formData.get("name") || "").trim(),
        role: String(formData.get("role") || "").trim(),
        vibe: String(formData.get("vibe") || "")
      };
    }

    function syncVibeSelection() {
      document.querySelectorAll(".vibe-card").forEach(card => {
        const input = card.querySelector("input");
        card.classList.toggle("is-selected", Boolean(input && input.checked));
      });
    }

    function validate(inputs) {
      const missing = !inputs.name || !inputs.role || !inputs.vibe;
      validationMessage.textContent = missing ? "Your AI name needs a little more data 👀" : "";
      return !missing;
    }

    function syllableEstimate(word) {
      const chunks = String(word).toLowerCase().match(/[aeiouy]+/g);
      return Math.max(1, chunks ? chunks.length : 1);
    }

    function uniqueWords(name) {
      return new Set(name.split(/\s+/).map(word => word.toLowerCase())).size;
    }

    function hasAwkwardRepeat(name) {
      const parts = name.toLowerCase().split(/\s+/);
      return parts.some((part, index) => index > 0 && part === parts[index - 1]);
    }

    function hasMatchingPrefixSuffix(name) {
      const expanded = name.replace(/([a-z])([A-Z])/g, "$1 $2").split(/\s+/);
      return expanded.length >= 3 && expanded[0].toLowerCase() === expanded[expanded.length - 1].toLowerCase();
    }

    function hasBareRoboName(name) {
      return /^Robo[A-Z][a-z]+$/.test(name);
    }

    function hasNameAndModifier(name, firstName) {
      return name !== firstName && (name.includes(firstName) || name.startsWith(`Robo${firstName} `));
    }

    function hasPrefixPattern(name, firstName) {
      return name.startsWith(`Robo${firstName} `) || /^[A-Z][a-z]+ [A-Z][a-z]+/.test(name) && !name.startsWith(`${firstName} `);
    }

    function hasSuffixPattern(name, firstName) {
      return name.startsWith(`${firstName} `);
    }

    function getPatternType(name, firstName) {
      if (name.startsWith(`Robo${firstName} `)) {
        return "fused";
      }
      if (name.startsWith(`${firstName} `)) {
        return "suffix-only";
      }
      if (name.split(/\s+/).length === 2) {
        return "prefix-only";
      }
      return "full";
    }

    function getNameEdges(name, firstName) {
      const expanded = name.replace(/([a-z])([A-Z])/g, "$1 $2");
      const parts = expanded.split(/\s+/);
      const prefix = name.startsWith(`Robo${firstName} `) ? "Robo" : parts[0] === firstName ? "" : parts[0];
      const suffix = parts[parts.length - 1] === firstName ? "" : parts[parts.length - 1];
      return { prefix, suffix };
    }

    function repeatsLastNameEdge(name, previousName, firstName) {
      if (!previousName) {
        return false;
      }
      const current = getNameEdges(name, firstName);
      const previous = getNameEdges(previousName, firstName);
      return Boolean(
        current.prefix && current.prefix === previous.prefix ||
        current.suffix && current.suffix === previous.suffix
      );
    }

    function hasReadableSound(name) {
      const compact = name.replace(/\s+/g, "");
      return !/[bcdfghjklmnpqrstvwxyz]{5,}/i.test(compact) && !/[aeiouy]{4,}/i.test(compact);
    }

    function hasGoodCadence(name) {
      const parts = name.split(/\s+/);
      const syllables = parts.map(syllableEstimate);
      const total = syllables.reduce((sum, value) => sum + value, 0);
      const lowerLimit = parts.length === 2 ? 3 : 4;
      return total >= lowerLimit && total <= 7 && parts.every(part => part.length >= 3 && part.length <= 12);
    }

    function hasLightAlliteration(name) {
      const words = name.replace(/([a-z])([A-Z])/g, "$1 $2").split(/\s+/);
      return words.length > 1 && words[0][0].toLowerCase() === words[1][0].toLowerCase();
    }

    function usesAny(name, words) {
      return words.some(word => new RegExp(`\\b${word}\\b`, "i").test(name) || name.startsWith(word));
    }


    function initialSound(word) {
      const lower = String(word).toLowerCase();
      if (lower.startsWith("sh")) return "SH";
      if (lower.startsWith("ch")) return "CH";
      const first = lower[0] || "";
      if (first === "c" || first === "k" || first === "q") return "K";
      return first.toUpperCase();
    }

    function nameSoundProfile(firstName) {
      const lower = String(firstName).toLowerCase();
      const sounds = [];
      const add = sound => {
        if (sound && !"AEIOUY".includes(sound) && !sounds.includes(sound)) sounds.push(sound);
      };
      add(initialSound(lower));
      for (let i = 0; i < lower.length; i += 1) {
        const pair = lower.slice(i, i + 2);
        if (pair === "sh" || pair === "ch") add(pair.toUpperCase());
        add(initialSound(lower[i]));
      }
      return sounds.slice(0, 3);
    }

    const soundPriorityWords = {
      B: { prefixes: ["Bright", "Bolt", "Buzzy"], suffixes: ["Bot", "Bolt", "Bingo"] },
      K: { prefixes: ["Captain", "Cosmo", "Kinetic"], suffixes: ["Kicker", "Keeper", "Comet"] },
      CH: { prefixes: ["Captain", "Kinetic"], suffixes: ["Kicker", "Comet"] },
      D: { prefixes: ["Dynamo", "Defender"], suffixes: ["Dash", "Dynamo", "Defender"] },
      F: { prefixes: ["Falcon", "Flash", "Firebolt"], suffixes: ["Firebolt", "Flash", "Falcon"] },
      G: { prefixes: ["Guardian", "Guide", "Glimmer"], suffixes: ["Guardian", "Glow", "Glimmer"] },
      J: { prefixes: ["Jet", "Jolt", "Joyride"], suffixes: ["Jolt", "Joyride", "Jet"] },
      L: { prefixes: ["Lightning", "Lumen"], suffixes: ["Lumen"] },
      M: { prefixes: ["Magic", "Mega"], suffixes: ["Magic", "Mega"] },
      P: { prefixes: ["Pilot", "Phoenix", "Prime"], suffixes: ["Pilot", "Prime", "Phoenix"] },
      R: { prefixes: ["Rocket", "Ranger"], suffixes: ["Ranger", "Rocket"] },
      S: { prefixes: ["Scout", "Shield", "Sterling"], suffixes: ["Sentinel", "Sparkle", "Scout"] },
      SH: { prefixes: ["Shield", "Sparkle", "Scout"], suffixes: ["Sparkle", "Sentinel", "Shield"] },
      T: { prefixes: ["Turbo", "Titan", "Thunderbolt"], suffixes: ["Titan", "Thunderbolt", "Bot"] },
      V: { prefixes: ["Vanguard", "Voyager", "Volt"], suffixes: ["Voyager", "Volt", "Overdrive"] },
      W: { prefixes: ["Warp", "Whiz"], suffixes: ["Whiz", "Warp"] }
    };

    function getSoundPriorityWords(firstName) {
      const sounds = nameSoundProfile(firstName);
      const merged = { prefixes: [], suffixes: [] };
      sounds.forEach(sound => {
        const group = soundPriorityWords[sound];
        if (!group) return;
        merged.prefixes.push(...group.prefixes);
        merged.suffixes.push(...group.suffixes);
      });
      return {
        prefixes: [...new Set(merged.prefixes)].filter(word => aGradeWords.includes(word)),
        suffixes: [...new Set(merged.suffixes)].filter(word => aGradeWords.includes(word))
      };
    }

    function soundMatchScore(name, firstName) {
      const soundWords = getSoundPriorityWords(firstName);
      const expanded = name.replace(/([a-z])([A-Z])/g, "$1 $2");
      let score = 0;
      soundWords.prefixes.forEach(word => {
        if (new RegExp(`^${word}\\b`).test(expanded)) score += 20;
      });
      soundWords.suffixes.forEach(word => {
        if (new RegExp(`\\b${word}$`).test(expanded)) score += 24;
      });
      if (/^Ben(jamin)?$/i.test(firstName) && new RegExp(`^${firstName} Bot$`, "i").test(expanded)) score += 60;
      return score;
    }

    function scoreName(name, inputs, archetype, profile) {
      const parts = name.split(/\s+/);
      const totalSyllables = parts.reduce((total, part) => total + syllableEstimate(part), 0);
      const firstName = cleanName(inputs.name);
      const roleWords = extractRoleNameWords(inputs.role);
      const lowerSyllableLimit = parts.length === 2 ? 3 : 4;
      let score = 0;

      score += hasNameAndModifier(name, firstName) ? 26 : -60;
      score += name.includes(firstName) ? 28 : -30;
      score += parts.length === 3 ? 20 : 0;
      score += parts.length === 2 ? 18 : 0;
      score += hasPrefixPattern(name, firstName) ? 12 : 0;
      score += hasSuffixPattern(name, firstName) ? 8 : 0;
      score += /^[A-Z][a-z]+[A-Z][a-z]+$/.test(name) ? 16 : 0;
      score += /^Robo[A-Z][a-z]+\\s[A-Z][a-z]+$/.test(name) ? 20 : 0;
      score += uniqueWords(name) === parts.length ? 12 : -24;
      score += stickyEndings.some(ending => name.endsWith(ending)) ? 16 : 0;
      score += profile.signature.some(word => name.endsWith(word)) ? 24 : 0;
      score += usesAny(name, archetype.suffixes) ? Math.round(8 * archetype.weight) : 0;
      score += usesAny(name, profile.heroPrefixes) ? 18 : 0;
      score += totalSyllables >= lowerSyllableLimit && totalSyllables <= 7 ? 18 : -28;
      score += hasGoodCadence(name) ? 14 : -18;
      score += hasReadableSound(name) ? 10 : -28;
      score += hasLightAlliteration(name) ? 5 : 0;
      score += usesAny(name, roleWords) ? 16 : 0;
      score += soundMatchScore(name, firstName);
      score += roleWords.some(word => name.startsWith(`${word} `) || name.endsWith(` ${word}`)) ? 12 : 0;
      score += smileWords.some(word => name.includes(word)) ? 10 : 0;
      score += aGradeWords.reduce((total, word) => total + (new RegExp(`\\b${word}\\b`, "i").test(name) || name.startsWith(word) ? 7 : 0), 0);
      score += /^(Robo|Quantum|Captain|Atlas|Apex|Archer|Vanguard|Spark|Rocket|Commander|Turbo|Bright|Calm|Guide|NorthStar|Command|Cosmo|Volt|Lightning|Shield|Scout)/.test(name) ? 10 : 0;
      score += /Quantum [A-Z][a-z]+ Overdrive/.test(name) ? 28 : 0;
      score += /Captain [A-Z][a-z]+ Guardian/.test(name) ? 24 : 0;
      score += /Bright [A-Z][a-z]+ Magic/.test(name) ? 24 : 0;
      score -= weakWords.reduce((penalty, word) => penalty + (new RegExp(`\\b${word}\\b`, "i").test(name) ? 45 : 0), 0);
      score -= hasAwkwardRepeat(name) ? 40 : 0;
      score -= hasMatchingPrefixSuffix(name) ? 55 : 0;
      score -= hasBareRoboName(name) ? 75 : 0;
      score -= /([a-z])\1{2,}/i.test(name) ? 24 : 0;
      score -= totalSyllables > 7 ? 45 : 0;
      score -= name.length > 32 ? 20 : 0;
      score -= name.length < 8 && totalSyllables < 3 ? 16 : 0;
      score -= /\b(Workflow|Organization|Efficiency|Systems|Customer|Marketing)\b/i.test(name) ? 35 : 0;

      return score;
    }

    function buildCandidateNames(firstName, profile, archetype, role) {
      const candidates = [];
      const roleWords = extractRoleNameWords(role);
      const soundWords = getSoundPriorityWords(firstName);

      if (/^Ben(jamin)?$/i.test(firstName)) {
        candidates.push(`${firstName} Bot`);
        candidates.push(`Bright ${firstName} Bot`);
      }

      soundWords.prefixes.forEach(prefix => {
        candidates.push(`${prefix} ${firstName}`);
        soundWords.suffixes.forEach(suffix => {
          if (prefix !== suffix) candidates.push(`${prefix} ${firstName} ${suffix}`);
        });
      });

      soundWords.suffixes.forEach(suffix => {
        candidates.push(`${firstName} ${suffix}`);
      });

      profile.heroPrefixes.forEach(prefix => {
        candidates.push(`${prefix} ${firstName}`);
        profile.signature.forEach(suffix => {
          candidates.push(`${prefix} ${firstName} ${suffix}`);
        });
        profile.suffixes.forEach(suffix => {
          candidates.push(`${prefix} ${firstName} ${suffix}`);
        });
      });

      profile.prefixes.forEach(prefix => {
        candidates.push(`${prefix} ${firstName}`);
        profile.signature.forEach(suffix => {
          candidates.push(`${prefix} ${firstName} ${suffix}`);
        });
      });

      profile.signature.forEach(suffix => {
        candidates.push(`${firstName} ${suffix}`);
      });

      profile.suffixes.forEach(suffix => {
        candidates.push(`${firstName} ${suffix}`);
      });

      roleWords.forEach(roleWord => {
        candidates.push(`${roleWord} ${firstName}`);
        candidates.push(`${firstName} ${roleWord}`);
        profile.signature.forEach(suffix => {
          candidates.push(`${roleWord} ${firstName} ${suffix}`);
        });
        profile.heroPrefixes.forEach(prefix => {
          candidates.push(`${prefix} ${firstName} ${roleWord}`);
        });
      });

      if (profile.fusedPrefixes.includes("Robo")) {
        profile.signature.forEach(suffix => {
          candidates.push(`Robo${firstName} ${suffix}`);
        });
      }

      if (profile.prefixes.includes("Quantum") && profile.suffixes.includes("Overdrive")) {
        candidates.push(`Quantum ${firstName} Overdrive`);
      }

      if (profile.prefixes.includes("Captain") && profile.signature.includes("Guardian")) {
        candidates.push(`Captain ${firstName} Guardian`);
      }

      return [...new Set(candidates)].filter(name => !hasMatchingPrefixSuffix(name));
    }

    function buildAlterEgo(inputs) {
      const profile = vibeProfiles[inputs.vibe];
      const firstName = cleanName(inputs.name);
      const archetype = inferArchetype(inputs.role);
      const roleWords = extractRoleNameWords(inputs.role);
      const candidates = buildCandidateNames(firstName, profile, archetype, inputs.role)
        .map(name => ({ name, score: scoreName(name, inputs, archetype, profile) }))
        .filter(candidate => candidate.score >= 30)
        .sort((a, b) => b.score - a.score);
      const fallback = `${pick(profile.heroPrefixes)} ${firstName} ${pick(profile.signature)}`;
      const diverseCandidates = [
        ...candidates.slice(0, 2),
        candidates.find(candidate => getPatternType(candidate.name, firstName) === "prefix-only"),
        candidates.find(candidate => getPatternType(candidate.name, firstName) === "suffix-only"),
        candidates.find(candidate => usesAny(candidate.name, roleWords)),
        candidates.find(candidate => candidate.name.endsWith("Bot")),
        candidates.find(candidate => getPatternType(candidate.name, firstName) === "fused")
      ].filter(Boolean);
      const topCandidates = [...new Map(diverseCandidates.map(candidate => [candidate.name, candidate])).values()].slice(0, 6);
      const freshCandidates = topCandidates.filter(candidate => !repeatsLastNameEdge(candidate.name, lastGeneratedName, firstName));
      const broadFreshCandidates = candidates.filter(candidate => !repeatsLastNameEdge(candidate.name, lastGeneratedName, firstName)).slice(0, 12);
      const namePool = broadFreshCandidates.length
        ? [...new Map([...broadFreshCandidates, ...freshCandidates].map(candidate => [candidate.name, candidate])).values()].slice(0, 10)
        : topCandidates;
      const winner = namePool[rerollCount % Math.max(1, namePool.length)] || { name: fallback };
      lastGeneratedName = winner.name;

      return {
        aiIcon: pick(profile.icons),
        aiName: winner.name
      };
    }

    function renderResult(inputs) {
      const generationKey = `${cleanName(inputs.name)}|${inputs.role.toLowerCase()}|${inputs.vibe}`;
      if (generationKey !== lastGenerationKey) {
        rerollCount = 0;
        lastGeneratedName = "";
        lastGenerationKey = generationKey;
      }
      rerollCount += 1;
      const alterEgo = buildAlterEgo(inputs);
      output.icon.textContent = alterEgo.aiIcon;
      output.name.textContent = alterEgo.aiName;
      resultCard.classList.remove("is-visible");
      void resultCard.offsetWidth;
      resultCard.classList.add("is-visible");
      resultCard.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    form.addEventListener("submit", event => {
      event.preventDefault();
      const inputs = getInputs();
      if (!validate(inputs)) {
        const firstMissing = !inputs.name ? document.querySelector("#name") : !inputs.role ? document.querySelector("#role") : document.querySelector("input[name='vibe']");
        firstMissing.focus({ preventScroll: false });
        return;
      }
      lastInputs = inputs;
      renderResult(inputs);
    });

    form.addEventListener("input", () => {
      syncVibeSelection();
      if (validationMessage.textContent) {
        validate(getInputs());
      }
    });

    form.addEventListener("change", syncVibeSelection);

    rerollButton.addEventListener("click", () => {
      const inputs = getInputs();
      if (validate(inputs)) {
        lastInputs = inputs;
        renderResult(lastInputs);
      }
    });
  </script>
</body>
</html>
